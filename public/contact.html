<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - Baseball Info</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Sticky Navbar -->
    <nav class="navbar">
        <div class="nav-container">
            <h1 class="logo"><a href="/">Baseball Info</a></h1>
            <ul class="nav-links">
                <li><a href="/">Home</a></li>
                <li><a href="#topics">Topics</a></li>
                <li><a href="past.html">Past</a></li>
                <li><a href="hof.html">Hall of Fame</a></li>
                <li><a href="minors.html">Minor League</a></li>
                <li><a href="contact.html" style="color: #3498db;">Contact</a></li>
            </ul>
        </div>
    </nav>

    <!-- Hero Section with background image -->
    <section id="hero" class="hero-section">
        <div class="hero-content">
            <h1>Contact Us</h1>
            <p>We'd love to hear from you!</p>
        </div>
    </section>

    <!-- Contact Form Section -->
    <section id="content" class="contact-section">
        <div class="container">
            <form class="contact-form" action="#" method="POST">
                <div class="form-group">
                    <label for="name">Name</label>
                    <input type="text" id="name" name="name" required>
                </div>
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" required>
                </div>
                <div class="form-group">
                    <label for="message">Message</label>
                    <textarea id="message" name="message" rows="5" required></textarea>
                </div>
                <button type="submit" class="submit-btn">Send Message</button>
            </form>
        </div>
    </section>

    <!-- Footer -->
    <footer class="footer">
        <p>&copy; 2026 Baseball Info. All rights reserved.</p>
    </footer>
</body>
</html>
